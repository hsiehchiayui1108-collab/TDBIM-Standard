# ============================================================
#
# 用詞慣例：
#   - 「目的」：用於描述圖紙、視圖、元素等非人格化媒介為何存在
#   - 「職責」：用於描述人員角色應做什麼（如服務對象中的各角色）
#   - 「必要性」：取值為「必要」或「視條件」
#   - 「用途」：讀者使用圖集的心智流程階段
#   (關於避免擬人化動詞的原則，詳見「設計哲學 > 不擬人化」)
#
# 視圖雙維度結構：
#   - 維度 1：視圖類型（呈現視角）— 平面／剖面／3D／索引／資訊區塊／表格
#   - 維度 2：資訊範圍（內容範圍）— 整合／軀體（僅平面、剖面、3D 適用）
#   - 兩維度正交獨立。例：「3D 整合圖」= 類型 3D視圖 + 資訊範圍 整合
#
# 本 YAML 性質：
#   本檔描述單一圖集的 schema。軀體圖圖集以樓層拆分，
#   每個樓層（筏基層、地上 1 層等）各自依此 schema 產生一份實例圖集。
# ============================================================

軀體圖定義:
  定義: >-
    軀體圖將專案中所有與混凝土構造有關的資訊——涵蓋建築、結構、裝修、
    機電等專業——整合為一套描述混凝土幾何（尺寸、位置、高程等）的
    施工依據，服務於模板、鋼筋、混凝土三大工項的施工需求。

服務範圍與對象:
  服務範圍: 建築物的混凝土工程
  服務對象:
    - 角色: 營造工程師
      職責: 設計圖的檢討、施工規劃與管理
    - 角色: 施工人員
      職責: 工地現場放樣與施工

應用階段:
  - 階段: 整合
    執行者: 繪製者
    說明: 整合所有與混凝土構造有關的資訊，涵蓋建築、結構、裝修、機電等領域
    範例: 輕隔間的混凝土基座、設備混凝土基座、混凝土地板因應地板裝修厚度的預降尺寸
  - 階段: 理解
    執行者: 所有相關人員
    說明: 以整合全貌的 3D 圖搭配 2D 圖呈現，讓所有相關人員直覺地看見全貌
  - 階段: 檢討
    執行者: 營造工程師
    說明: 分散的 2D 圖整合後，更容易看見彼此衝突、缺漏之處
  - 階段: 規劃
    執行者: 各專業施工單位
    說明: 在自身專業範圍內，經整合、理解、檢討後，規劃施工計畫
  - 階段: 協調
    執行者: 跨專業施工單位
    說明: 各專業施工單位將彼此的施工規劃套疊整合，以協調跨專業的介面
  - 階段: 施工
    執行者: 施工人員
    說明: 以協調後的成果作為施工依據

設計哲學:
  說明: >-
    本架構在設計過程中遵循以下原則。當規則條文衝突或情境未被明文涵蓋時，
    以這些原則為判斷依據；當原則彼此衝突時，以「閱讀優先」為仲裁原則。

  原則:
    - 名稱: 簡潔優先（KISS）
      說明: >-
        不過度建模。能合併的欄位合併、不必要的欄位刪除。
        寧可少一個欄位，需要時再加；不預先建模未證明必要的概念。

    - 名稱: 格式細節不入架構
      說明: >-
        分隔符、前綴、檔名規範等屬實作層細節，不在此架構規範。
        架構只定義語意結構，不定義視覺或格式呈現。

    - 名稱: 閱讀優先
      角色: 仲裁原則
      說明: >-
        命名與結構服務於讀者理解，不服務於工具或檔案系統的整齊性。
        當其他原則衝突時，以本原則為仲裁依據。

    - 名稱: 不擬人化
      說明: >-
        圖紙、視圖、元素是媒介，不是主體。描述時避免使用「回答」「解決」
        等擬人化動詞，改用「針對」「呈現」等中性描述詞。

    - 名稱: 單一真相來源（SSOT）
      說明: >-
        每個資訊只在一個地方維護，避免重複。需要引用其他區塊的內容時，
        明示引用來源（例「依必要觸發規則.必要性取值」），不重述內容。

架構元定義:
  元素類別枚舉:
    實體:
      定義: 代表施工實際涉及的構件或構造特徵，具有幾何形狀
      判別問題: 這是施工會實際做出來、或影響到的物理事物嗎？
      用例: RC柱、RC梁、RC版、RC牆、輕隔間、門窗牆面開口、樓板開口、RC設備基座
      屬性 schema:
        強制: [邊界線]
        可選: [切割面填充色, 表面填充色, 填充線]
        說明: >-
          可選屬性依構件與視圖的幾何關係決定：被剖切的構件使用
          切割面填充色與填充線；未被剖切但表面可見的構件使用表面填充色。

    尺寸標註:
      定義: 以數值標示物件之間或物件本身的尺寸關係，由尺寸線與數字構成
      判別問題: 這是用數字標出的距離或大小嗎？
      用例: 網格到放樣基準線、柱邊到梁邊、梁邊到梁邊、牆厚、開口定位及尺寸
      屬性 schema:
        強制: [尺寸線]

    符號:
      定義: 自由放置的視覺記號或文字標籤，透過形式或位置傳達非尺寸性資訊
      判別問題: 這是獨立放置的視覺記號，既不是表單欄位也不是純尺寸數字嗎？
      用例: 修訂符號、雲形線、疑義編號標籤、高低版符號、空間名稱、RC柱編號及斷面尺寸、BIM中心logo
      屬性 schema:
        強制: [線條]

    資料欄位:
      定義: >-
        存在於結構化容器（標題欄、表單、明細表）中，以「鍵-值」對呈現的欄位。
        鍵由容器結構定義，值隨專案填入。
      判別問題: 這是表單格子裡有固定鍵、內容可變的資料嗎？
      用例: 業主名稱、專案名稱、圖號、圖名、版次、疑義編號、提出日期
      屬性 schema:
        強制: []

  必要觸發規則:
    不變式: >-
      任何層級的項目，必要性為「視條件」時必有觸發條件；
      有觸發條件時必要性必為「視條件」。兩者雙向綁定。

    必要性取值:
      必要: 在上一層容器中必定存在
      視條件: 在上一層容器中視觸發條件決定是否存在

    層級相對性: >-
      每一層的必要性判斷皆相對於「上一層容器」，非絕對判斷。
      圖紙的必要性相對於圖集、視圖相對於圖紙、元素相對於視圖。

    適用層級:
      - 層級: 圖紙
        判斷問題: 在圖集裡是否存在
      - 層級: 視圖
        判斷問題: 在圖紙裡是否存在
      - 層級: 元素
        判斷問題: 在視圖裡是否存在

    觸發條件撰寫規範:
      - 必須描述「何時需要此項目」，而非「此項目的目的」
      - 條件必須可判斷（能回答「現在這個情況觸發了嗎？」）
      - 允許「由繪圖者依 X 判斷」，但 X 必須具體
        （例：「依節點斷面幾何複雜度判斷」，而非「依複雜度判斷」）

  目的描述結構:
    共通原則:
      - 目的描述只說明「為何存在、提供什麼、達成什麼」
      - 不描述繪圖流程、版面編排、格式限制
      - 觸發條件由獨立欄位承載，不寫入目的描述

    圖紙:
      三段結構:
        使用情境: 讀者何時需要這張圖、要解決什麼任務
        核心內容: 這張圖整體提供什麼資訊
        使用成果: 讀者能完成什麼判讀／核對／施工／協作
      模板: >-
        當[使用情境]時，提供[核心內容]，使[角色]能[使用成果]。

    視圖:
      三段結構:
        使用情境: 這個視圖針對什麼具體需求
        核心內容: 以什麼視角或方式呈現什麼核心資訊
        使用成果: 讀者透過此視圖能完成什麼動作
      模板: >-
        針對「[使用情境]」，以[核心內容]，使[角色]能[使用成果]。

    元素:
      三段結構:
        使用情境: 這個元素針對什麼局部需求（僅視條件元素需填）
        核心內容: 這個元素提供什麼資訊
        使用成果: 讀者能根據此元素完成什麼判讀或動作
      模板:
        必要元素: >-
          呈現[核心內容]，使[角色]能[使用成果]。
        視條件元素: >-
          當[使用情境]時，呈現[核心內容]，使[角色]能[使用成果]。
      填寫規則:
        必要元素: 目的欄位可選；若目的不言自明可省略
        視條件元素: 目的欄位強制，完整三段結構

  命名原則:
    共通原則: >-
      依設計哲學.閱讀優先、設計哲學.格式細節不入架構。
      所有層級的命名皆應讓讀者能從名稱直接想像其目的或內容。

    圖集:
      原則: 名稱應描述此圖集的服務範圍與主要目的

    圖紙:
      原則: 名稱應讓讀者從中理解此圖紙服務的空間範圍與核心內容

    視圖:
      原則: 名稱應讓讀者從中理解此視圖針對什麼需求、以什麼角度呈現

    元素:
      原則: 名稱應讓讀者從中理解此元素是什麼、屬於什麼類別
      特殊規則:
        - 同一語意的元素在不同視圖中應使用同一名稱
          （例：「RC 版」與「RC 樓板」擇一，不混用）
        - 同一元素可在不同視圖以不同粒度呈現，以服務該視圖的用途
          （例：見上平面圖以粗粒度「牆面開口」服務施工查核；
           3D 整合圖以細粒度「門窗牆面開口」「捲門門軌牆面開口」等
           解釋各開口之由來）
      命名模式:
        建議: 採「[修飾語][類別詞]」連貫自然語言
          （例：「門窗牆面開口」「機電設備基座」「外牆欄杆」）

    共通硬性規則:
      - 名稱只能描述項目本身語意，備註、原因、相關關係放入獨立欄位
      - 名稱不承擔結構上下文的分類責任（如「這是跟著哪張圖的」由上下文承擔）
      - 禁止「（同上）」這類無語意的省略寫法
      - 禁止多餘空格或非意義字元
      - 名稱使用連貫自然語言，禁止下底線等分隔符切分類別與細分
        （禁止：「牆面開口_門窗」；採用：「門窗牆面開口」）

  圖紙用途:
    說明: >-
      讀者使用圖集的心智流程分為四種用途。每張圖紙可服務多種用途
      （以「所屬用途」list 標示），其中「主要用途」決定圖紙在圖集中的排序位置。
    用途清單:
      - 用途: 確認
        目的: 確認圖集內容的正確性
      - 用途: 理解全貌
        目的: 建立最終完工樣貌的空間認知，以理解軀體圖各項設計決策的背景
      - 用途: 理解差異
        目的: 比對軀體圖與設計圖（基本圖說）的差異
      - 用途: 施工
        目的: 作為施工階段的查閱依據

  圖紙與視圖拆分原則:
    原則: >-
      拆分以「版面容量」與「內容關聯性」為依據。
      關聯性高的資訊優先整合於同一張圖或同一視圖；
      當版面裝不下時，依重要性排序，將最不重要的資訊移至另一張圖或另一視圖。
    適用層級: [圖紙, 視圖]
    明文排除:
      - 涵蓋樓層範圍不是拆分依據
      - 圖紙類型（平面／剖面／3D）不是拆分依據

  圖紙層級元規則:
    強制欄位:
      - 名稱
      - 目的
      - 所屬用途
      - 主要用途
      - 必要性
      - 視圖
    條件強制欄位:
      - 欄位: 觸發條件
        條件: 必要性為「視條件」
    可選欄位:
      - 主要用途理由

    欄位規範:
      名稱:
        類型: string
        規範: 依命名原則.圖紙
      目的:
        類型: object
        結構: 依目的描述結構.圖紙（三段結構展開）
      所屬用途:
        類型: list
        值域: 依圖紙用途.用途清單
        約束: 至少一個值
      主要用途:
        類型: enum（單一值）
        值域: 依圖紙用途.用途清單
        約束: 必須為「所屬用途」中的一員
      主要用途理由:
        類型: string
        用途: 記錄繪圖者為何選擇該主要用途，供審查參考
      必要性:
        類型: enum
        值域: 依必要觸發規則.必要性取值
      觸發條件:
        類型: string
        規範: 依必要觸發規則.觸發條件撰寫規範
      視圖:
        類型: list
        規範: 依視圖層級元規則

  視圖類型:
    說明: >-
      視圖的第一個維度：呈現視角。
      定義「以什麼視角呈現」，與「資訊範圍」維度正交獨立。
    類型清單:
      - 類型: 平面視圖
        定義: 以俯視或仰視角度呈現水平面上的物件關係
        強制呈現參數: [比例]
        範例: 平面圖、軀體見上圖、軀體見下圖
      - 類型: 剖面視圖
        定義: 以垂直切面呈現物件的斷面與高度關係（含沿彎曲路徑展開的剖面）
        強制呈現參數: [比例]
        範例: 整合剖面圖、軀體剖面圖、坡段斜率展開圖
      - 類型: 3D視圖
        定義: 以立體視角呈現物件的空間關係
        可選呈現參數: [剖面高度, 角度]
        範例: 3D整合圖、3D軀體圖
      - 類型: 索引視圖
        定義: 以簡化圖面呈現某對象在更大空間中的位置
        強制呈現參數: []
        範例: Keyplan、剖面視圖範圍圖、圖集範圍圖
      - 類型: 資訊區塊
        定義: 以版面區塊呈現識別、簽核、圖例等輔助資訊
        強制呈現參數: []
        範例: 中央資訊區、簽核欄位、圖紙資訊框、圖例
      - 類型: 表格
        定義: 以結構化列表呈現多筆同類資料
        強制呈現參數: []
        範例: 圖紙明細表、版次說明表、疑義明細表、繪製依據與版次

  資訊範圍:
    說明: >-
      視圖的第二個維度：內容範圍。
      僅平面視圖、剖面視圖、3D 視圖適用；
      索引視圖、資訊區塊、表格不涉及建物本體，不套用此欄位。
    值域:
      - 名稱: 整合
        定義: >-
          含跨專業（建築、結構、裝修、機電）且與軀體界面有關
          （影響混凝土形狀或位置）的完工樣貌
      - 名稱: 軀體
        定義: 僅含混凝土構造的形狀與位置

  通用視圖:
    說明: >-
      結構與目的在所有圖紙中一致的視圖。實例化時，圖紙的視圖 list 中
      只需以「引用: [通用視圖名稱]」呼叫，不需重複撰寫視圖內容。
      注意：通用視圖的「結構與目的」一致，但實際渲染的元素內容
      可能依圖紙上下文而異（例如圖例實際呈現哪些線型，依該圖紙
      用到的元素決定）。
    清單:
      - 視圖: 圖例
        類型: 資訊區塊
        必要性: 必要
        目的:
          使用情境: 讀者需確認圖面中各類線條與符號代表什麼
          核心內容: 列出該圖紙所用線型與符號的對應說明
          使用成果: 能正確辨識圖面中各類構件與資訊
      - 視圖: 剖面視圖範圍圖
        類型: 索引視圖
        必要性: 必要
        目的:
          使用情境: 讀者需確認該視圖涵蓋建築中的哪個樓層範圍
          核心內容: 以簡化立面標示本視圖所在的樓層位置
          使用成果: 能快速對照該視圖與整棟建築的關係
      - 視圖: 分區位置索引
        類型: 索引視圖
        必要性: 視條件
        觸發條件: 圖紙因版面容量以分區方式繪製
        目的:
          使用情境: 讀者需對應分區視圖與整層圖的空間關係
          核心內容: 以簡化的整層平面標示當前分區在整層中的位置
          使用成果: 快速確認本分區在整層中的位置

  視圖層級元規則:
    強制欄位:
      - 名稱
      - 類型
      - 目的
      - 必要性
    條件強制欄位:
      - 欄位: 觸發條件
        條件: 必要性為「視條件」
      - 欄位: 資訊範圍
        條件: 類型為平面視圖、剖面視圖或 3D 視圖
      - 欄位: 比例
        條件: 類型為平面視圖或剖面視圖
      - 欄位: 元素
        條件: 非通用視圖引用
    可選欄位:
      - 剖面高度   # 類型為 3D 視圖時適用
      - 角度       # 類型為 3D 視圖時適用

    通用視圖引用:
      說明: >-
        若視圖為通用視圖，圖紙中僅需寫「引用: [通用視圖名稱]」，
        其他所有欄位（含必要性、觸發條件）皆從架構元定義.通用視圖查找。
      語法範例: "引用: 圖例"
      互斥性: 使用「引用」時，其他欄位皆不填寫

    欄位規範:
      名稱:
        類型: string
        規範: 依命名原則.視圖
      類型:
        類型: enum
        值域: 依視圖類型.類型清單
      目的:
        類型: object
        結構: 依目的描述結構.視圖（三段結構展開）
      必要性:
        類型: enum
        值域: 依必要觸發規則.必要性取值
      觸發條件:
        類型: string
        規範: 依必要觸發規則.觸發條件撰寫規範
      資訊範圍:
        類型: enum
        值域: 依資訊範圍.值域
      比例:
        類型: string
        範例: '"1:100"、"1:50~1:100"'
      剖面高度:
        類型: string
        範例: "FL+150"
      角度:
        類型: string
        範例: "前右上45"
      元素:
        類型: list
        規範: 依元素層級元規則
      引用:
        類型: string
        值域: 依通用視圖.清單

  元素層級元規則:
    強制欄位:
      - 名稱
      - 類別
      - 必要性
    條件強制欄位:
      - 欄位: 屬性
        條件: 類別的屬性 schema 含強制屬性
      - 欄位: 觸發條件
        條件: 必要性為「視條件」
      - 欄位: 目的
        條件: 必要性為「視條件」
    可選欄位:
      - 欄位: 目的
        適用: 必要性為「必要」時
        備註: 同一欄位在必要性為「視條件」時升級為條件強制

    屬性值的視圖相關性: >-
      同一元素在不同視圖中可有不同屬性值，反映該元素在該視圖中的角色。
      例：RC柱在軀體見上圖用深灰突出當層主角，在3D整合圖用淺灰作為背景。

    欄位規範:
      名稱:
        類型: string
        規範: 依命名原則.元素（含特殊規則）
      類別:
        類型: enum
        值域: 依元素類別枚舉
      必要性:
        類型: enum
        值域: 依必要觸發規則.必要性取值
      觸發條件:
        類型: string
        規範: 依必要觸發規則.觸發條件撰寫規範
      目的:
        類型: object
        結構: 依目的描述結構.元素
      屬性:
        類型: object
        schema: 依元素類別枚舉.<類別>.屬性 schema

圖集:
  名稱: "[樓層名]軀體圖圖集"
  目的: 整合該樓層軀體施工所需的全部資訊，供該樓層的檢討、規劃、協調與施工
  圖紙排序原則: >-
    圖紙依「主要用途」之順序排列（確認 → 理解全貌 → 理解差異 → 施工）；
    同屬「施工」用途的圖紙內部按施工物理順序（柱牆 → 梁版）排列。
  圖紙: []
  # 實例化時填入圖紙 list。圖紙結構依架構元定義.圖紙層級元規則。
  
